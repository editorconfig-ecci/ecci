name: Pull request
on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - 'tagpr-from-v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - 'crates/**'
      - '.github/workflows/pull_request.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  RUST_LOG: info
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Install Taplo
        uses: taiki-e/install-action@taplo
      - name: Run format
        run: |
          cargo fmt --all -- --check
          taplo format --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
        with:
          components: clippy
      - name: Run cargo check
        run: cargo check --workspace --all-targets --release
      - name: Run clippy
        run: cargo clippy

  check-dependencies:
    name: Check dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup toolchain
        run: rustup toolchain install nightly
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Install udeps
        run: cargo install cargo-udeps --locked
      - name: Run udeps
        run: cargo +nightly udeps --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Rust
        uses: moonrepo/setup-rust@v1
      - name: Install libeditorconfig
        run: |
          sudo apt-get update
          sudo apt-get install --yes libeditorconfig-dev
      - name: Run tests
        run: cargo test --workspace

  actions-timeline:
    name: Actions timeline
    permissions:
      actions: read
    needs: [format, lint, check-dependencies, test]
    runs-on: ubuntu-latest
    steps:
      - uses: Kesin11/actions-timeline@v3
